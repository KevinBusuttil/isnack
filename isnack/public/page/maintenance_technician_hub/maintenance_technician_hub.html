<div class="mth-root">
  <div class="mth-toolbar">
    <div class="mth-scan">
      <input type="text" class="mth-scan-input" id="mth-scan-input"
             placeholder="Scan or enter asset code / QR…" autocomplete="off" />
      <button class="mth-btn mth-btn-primary" id="mth-scan-btn">Lookup</button>
    </div>
    <div class="mth-toolbar-right">
      <select class="mth-tech-select" id="mth-tech-select" style="display:none"></select>
      <button class="mth-btn" id="mth-refresh-btn">Refresh</button>
    </div>
  </div>

  <div class="mth-summary" id="mth-summary"></div>

  <div class="mth-asset-panel" id="mth-asset-panel" style="display:none"></div>

  <div class="mth-board" id="mth-board">
    <div class="mth-loading">Loading your maintenance work…</div>
  </div>
</div>
